name: Benchmark candidate models (ADTC reference-like hardware)

on:
  workflow_dispatch: {}

jobs:
  benchmark:
    # GitHub-hosted ubuntu-latest: 4 vCPU, 16GB RAM, x86-64 — much closer to
    # the ADTC standard laptop profile (i5 10th-12th gen, 4 vCPU) than the
    # 2-core dev Mac we prototyped on.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show CPU info
        run: |
          echo "=== CPU ==="
          lscpu
          echo "=== Memory ==="
          free -h

      - name: Download prebuilt llama.cpp (Ubuntu x64 release)
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          # Plain CPU build only — asset is named exactly
          # "llama-b<build>-bin-ubuntu-x64.tar.gz" (no rocm/sycl/vulkan/openvino suffix)
          ASSET_URL=$(curl -s "$API_URL" | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          pattern = re.compile(r'^llama-b\d+-bin-ubuntu-x64\.tar\.gz$')
          for a in data['assets']:
              if pattern.match(a['name']):
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $ASSET_URL"
          curl -L -o llama.tar.gz "$ASSET_URL"
          mkdir -p llama-bin
          tar -xzf llama.tar.gz -C llama-bin
          find llama-bin -maxdepth 4 -type f -name "llama-*" -exec chmod +x {} \;
          find llama-bin -maxdepth 4 -type d
          BIN_DIR=$(dirname "$(find llama-bin -maxdepth 4 -type f -name 'llama-bench' | head -1)")
          echo "BIN_DIR=$BIN_DIR"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          # llama.cpp's shared libs (libggml*, libllama*) live alongside the binaries
          echo "LD_LIBRARY_PATH=$BIN_DIR:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          find llama-bin -maxdepth 4 -type d

      - name: Download candidate models
        run: |
          set -euo pipefail
          mkdir -p candidates
          curl --http1.1 -L --fail --retry 8 --retry-delay 3 -C - \
            -o candidates/qwen2.5-1.5b-instruct-q4_k_m.gguf \
            "https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf"
          curl --http1.1 -L --fail --retry 8 --retry-delay 3 -C - \
            -o candidates/gemma-2-2b-it-q4_k_m.gguf \
            "https://huggingface.co/bartowski/gemma-2-2b-it-GGUF/resolve/main/gemma-2-2b-it-Q4_K_M.gguf"
          ls -lh candidates/

      - name: Benchmark throughput (llama-bench)
        run: |
          set -euo pipefail
          echo "## Qwen2.5-1.5B-Instruct" | tee -a "$GITHUB_STEP_SUMMARY"
          llama-bench -m candidates/qwen2.5-1.5b-instruct-q4_k_m.gguf -t 4 | tee -a "$GITHUB_STEP_SUMMARY"
          echo "" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "## Gemma-2-2B-it" | tee -a "$GITHUB_STEP_SUMMARY"
          llama-bench -m candidates/gemma-2-2b-it-q4_k_m.gguf -t 4 | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Quality + peak RAM check (llama-simple)
        run: |
          set -euo pipefail
          PROMPT="You are a medical assistant. Explain what diabetes is in simple terms."
          echo "## Qwen — sample output + peak RAM" | tee -a "$GITHUB_STEP_SUMMARY"
          /usr/bin/time -v llama-simple -m candidates/qwen2.5-1.5b-instruct-q4_k_m.gguf -n 100 "$PROMPT" 2>&1 \
            | tee qwen_out.log | tail -30
          grep -E "Maximum resident|decoded" qwen_out.log | tee -a "$GITHUB_STEP_SUMMARY" || true
          echo "" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "## Gemma — sample output + peak RAM" | tee -a "$GITHUB_STEP_SUMMARY"
          /usr/bin/time -v llama-simple -m candidates/gemma-2-2b-it-q4_k_m.gguf -n 100 "$PROMPT" 2>&1 \
            | tee gemma_out.log | tail -30
          grep -E "Maximum resident|decoded" gemma_out.log | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Upload full logs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs
          path: |
            qwen_out.log
            gemma_out.log
